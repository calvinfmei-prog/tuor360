<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso aos Imóveis</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#111,#1e1e1e);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  color:white;
}

.box{
  width:100%;
  max-width:380px;
  background:#1a1a1a;
  padding:55px 40px;
  border-radius:18px;
  text-align:center;
  box-shadow:0 25px 60px rgba(0,0,0,0.6);
}

h2{
  margin-bottom:10px;
  font-weight:600;
}

p{
  font-size:14px;
  color:#aaa;
  margin-bottom:25px;
}

input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  font-size:14px;
  margin-bottom:20px;
  outline:none;
}

input:focus{
  box-shadow:0 0 0 2px #25D366;
}

button{
  width:100%;
  padding:15px;
  background:#25D366;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:600;
  font-size:15px;
  cursor:pointer;
  transition:0.25s;
}

button:hover{
  background:#1ebe5d;
  transform:translateY(-2px);
}

.erro{
  margin-top:15px;
  font-size:13px;
  color:#ff4d4d;
}

</style>

</head>
<body>

<div class="box">

  <h2>Imóveis 360</h2>
  <p>Digite o código do corretor</p>

  <form onsubmit="acessar(event)">

    <input
      type="text"
      id="codigo"
      placeholder="Digite seu código"
      autocomplete="off"
      required
    >

    <button type="submit">Entrar</button>

  </form>

  <div class="erro" id="erro"></div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>

</body>
</html>
