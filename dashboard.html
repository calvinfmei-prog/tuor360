<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard do Corretor</title>

<link rel="stylesheet" href="/style.css">

</head>

<body>

<div class="dashboard-container">

<h1>Dashboard do Corretor</h1>

<h2 id="nomeCorretor"></h2>

<div class="cards">

<div class="card">
<h3>Imóveis cadastrados</h3>
<p id="totalImoveis">0</p>
</div>

<div class="card">
<h3>Valor da carteira</h3>
<p id="valorCarteira">R$ 0</p>
</div>

<div class="card">
<h3>Valor vendido</h3>
<p id="valorVendido">R$ 0</p>
</div>

<div class="card">
<h3>Visualizações totais</h3>
<p id="totalViews">0</p>
</div>

</div>

<h2>Meus imóveis</h2>

<div id="listaImoveis"></div>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const { createClient } = supabase;
</script>

<script src="/dashboard.js"></script>

<div id="modalEditar" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); align-items:center; justify-content:center;">

<div style="background:white; padding:30px; border-radius:10px; width:520px; max-height:90vh; overflow:auto;">

<h2>Editar Imóvel</h2>

<label>Título do imóvel</label>
<input id="editTitulo" placeholder="Ex: Casa de Alto Padrão" style="width:100%; margin-bottom:15px">

<label>Preço</label>
<input id="editPreco" placeholder="Ex: 850.000" style="width:100%; margin-bottom:15px">

<label>Características</label>

<div style="display:flex; gap:10px; margin-bottom:15px">

<div style="flex:1">
<label>Quartos</label>
<input id="editQuartos" placeholder="Ex: 3" style="width:100%">
</div>

<div style="flex:1">
<label>Banheiros</label>
<input id="editBanheiros" placeholder="Ex: 2" style="width:100%">
</div>

</div>

<label>Área (m²)</label>
<input id="editArea" placeholder="Ex: 120" style="width:100%; margin-bottom:15px">

<label>Status do imóvel</label>
<select id="editStatus" style="width:100%; margin-bottom:20px">

<option value="disponivel">Disponível</option>
<option value="vendido">Vendido</option>

</select>

<h3>Extras do imóvel</h3>

<div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:20px">

<label><input type="checkbox" id="extraPiscina"> Piscina</label>
<label><input type="checkbox" id="extraGaragem"> Garagem</label>
<label><input type="checkbox" id="extraAcademia"> Academia</label>
<label><input type="checkbox" id="extraGourmet"> Área Gourmet</label>

</div>

<div style="display:flex; gap:10px">

<button onclick="salvarEdicao()" style="flex:1">
Salvar alterações
</button>

<button onclick="fecharModal()" style="flex:1">
Cancelar
</button>

</div>

</div>

</div>

</body>

</html>
