<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard do Corretor</title>

<link rel="stylesheet" href="/style.css">

</head>

<body>

<div class="dashboard-container">

<div class="dashboard-header">

<div>
<h1>Dashboard</h1>
<p id="nomeCorretor"></p>
</div>

<button onclick="logout()" class="btn-sair">
Sair
</button>

</div>


<div class="cards">

<div class="card card-metrica">
<span>🏠</span>
<div>
<h3>Imóveis</h3>
<p id="totalImoveis">0</p>
</div>
</div>

<div class="card card-metrica">
<span>💰</span>
<div>
<h3>Carteira</h3>
<p id="valorCarteira">R$ 0</p>
</div>
</div>

<div class="card card-metrica">
<span>📉</span>
<div>
<h3>Vendidos</h3>
<p id="valorVendido">R$ 0</p>
</div>
</div>

<div class="card card-metrica">
<span>👀</span>
<div>
<h3>Visualizações</h3>
<p id="totalViews">0</p>
</div>
</div>

</div>


<h2 class="titulo-secao">Meus imóveis</h2>

<div id="listaImoveis" class="lista-imoveis"></div>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const { createClient } = supabase;
</script>

<script src="/dashboard.js"></script>


<div id="modalEditar" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); align-items:center; justify-content:center;">

<div style="background:white; padding:30px; border-radius:10px; width:520px; max-height:90vh; overflow:auto;">

<h2>Editar Imóvel</h2>

<label>Título do imóvel</label>
<input id="editTitulo" style="width:100%; margin-bottom:15px">

<label>Preço</label>
<input id="editPreco" style="width:100%; margin-bottom:15px">

<label>Quartos</label>
<input id="editQuartos" style="width:100%; margin-bottom:15px">

<label>Suítes</label>
<input id="editSuites" style="width:100%; margin-bottom:15px">

<label>Lavabos</label>
<input id="editLavabos" style="width:100%; margin-bottom:15px">

<label>Vagas na garagem</label>
<input id="editVagas" style="width:100%; margin-bottom:15px">

<label>Banheiros</label>
<input id="editBanheiros" style="width:100%; margin-bottom:15px">

<label>Área</label>
<input id="editArea" style="width:100%; margin-bottom:15px">

<h3>Características</h3>

<label>
  <input type="checkbox" id="editAreaServico"> Área de serviço
</label>

<label style="margin-left:10px;">
  <input type="checkbox" id="editVarandaEstrutural"> Varanda
</label>

<label>Status</label>
<select id="editStatus" style="width:100%; margin-bottom:20px">
<option value="disponivel">Disponível</option>
<option value="vendido">Vendido</option>
</select>

<h3>Extras</h3>

<label><input type="checkbox" id="extraPiscina"> Piscina</label>
<label><input type="checkbox" id="extraGaragem"> Garagem</label>
<label><input type="checkbox" id="extraAcademia"> Academia</label>
<label><input type="checkbox" id="extraGourmet"> Área Gourmet</label>
<label><input type="checkbox" id="extraChurrasqueira"> Churrasqueira</label>
<label><input type="checkbox" id="extraElevador"> Elevador</label>
<label><input type="checkbox" id="extraVaranda"> Varanda</label>
<label><input type="checkbox" id="extraJardim"> Jardim</label>
<label><input type="checkbox" id="extraPortaria"> Portaria 24h</label>
<label><input type="checkbox" id="extraDependencia"> Dependência de Empregada</label>

<br><br>

<button onclick="salvarEdicao()">Salvar</button>
<button onclick="fecharModal()">Cancelar</button>

</div>
</div>
</body>

</html>
