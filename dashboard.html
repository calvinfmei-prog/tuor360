<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

</div>

<span>🏠</span>
<div>
<h3>Imóveis</h3>

</div>
</div>

<div class="card card-metrica">
<span>💰</span>
<div>
<h3>Carteira</h3>
<p id="valorCarteira">R$ 0</p>
</div>
</div>

<div class="card card-metrica">
<span>📉</span>
<div>

<p id="valorVendido">R$ 0</p>
</div>
</div>

<div class="card card-metrica">
<span>👀</span>
<div>
<h3>Visualizações</h3>
<p id="totalViews">0</p>
</div>
</div>

</div>


<h2 class="titulo-secao">Meus imóveis</h2>

<div id="listaImoveis" class="lista-imoveis"></div>
