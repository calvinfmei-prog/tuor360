<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard do Corretor</title>

<link rel="stylesheet" href="/style.css">

</head>

<body>

<div class="dashboard-container">

<h1>Dashboard do Corretor</h1>

<h2 id="nomeCorretor"></h2>

<div class="cards">

<div class="card">
<h3>Imóveis cadastrados</h3>
<p id="totalImoveis">0</p>
</div>

<div class="card">
<h3>Valor da carteira</h3>
<p id="valorCarteira">R$ 0</p>
</div>

<div class="card">
<h3>Valor vendido</h3>
<p id="valorVendido">R$ 0</p>
</div>

<div class="card">
<h3>Visualizações totais</h3>
<p id="totalViews">0</p>
</div>

</div>

<h2>Meus imóveis</h2>

<div id="listaImoveis"></div>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const { createClient } = supabase;
</script>

<script src="/dashboard.js"></script>

<div id="modalEditar" class="modal">

<div class="modal-content">

<h2>Editar Imóvel</h2>

<input id="editTitulo" placeholder="Título">

<input id="editPreco" placeholder="Preço">

<select id="editStatus">
<option value="disponivel">Disponível</option>
<option value="vendido">Vendido</option>
</select>

<div style="margin-top:20px">

<button onclick="salvarEdicao()">Salvar</button>
<button onclick="fecharModal()">Cancelar</button>

</div>

</div>

</div>

</body>

</html>
