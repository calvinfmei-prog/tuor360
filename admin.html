<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Admin</title>

<link rel="stylesheet" href="style.css">

<style>

body{
font-family:Arial;
background:#f4f6f9;
}

.container{
max-width:500px;
margin:auto;
margin-top:80px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:25px;
}

form{
display:flex;
flex-direction:column;
gap:12px;
}

input, select{
padding:10px;
border-radius:6px;
border:1px solid #ddd;
font-size:14px;
}

button{
background:#1976d2;
color:white;
border:none;
padding:12px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#145aa3;
}

.logout{
background:#e53935;
margin-top:20px;
}

.hidden{
display:none;
}

.extras-box{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:5px;
}

.extra-item{
background:#f1f1f1;
padding:6px 10px;
border-radius:20px;
font-size:13px;
cursor:pointer;
}

.preview-img{
max-width:100%;
border-radius:8px;
margin-top:10px;
display:none;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginBox" class="container">

<h1>Login Admin</h1>

<form id="loginForm">

<input id="email" type="email" placeholder="Email" required>

<input id="password" type="password" placeholder="Senha" required>

<button type="submit">
Entrar
</button>

</form>

</div>

<!-- PAINEL -->

<div id="adminPanel" class="container hidden">

<h1>Cadastrar Imóvel</h1>

<form id="form-imovel">

<select id="corretor">
<option value="">Selecionar corretor</option>
</select>

<input id="titulo" placeholder="Título do imóvel" required>

<select id="tipo">
<option value="venda">Venda</option>
<option value="aluguel">Aluguel</option>
</select>

<input id="preco" placeholder="Preço" required>

<input id="quartos" type="number" placeholder="Quartos" required>

<input id="banheiros" type="number" placeholder="Banheiros" required>

<input id="suites" type="number" placeholder="Suites" required>

<input id="lavabos" type="number" placeholder="Lavabos" required>

<input id="vagas" type="number" placeholder="Vagas na Garagem" required>

<input id="area" type="number" placeholder="Área m²" required>

<!-- CHECKBOXES -->
<div style="margin-top: 10px;">
  <label>
    <input type="checkbox" id="area_servico"> Área de serviço
  </label>

  <label style="margin-left: 10px;">
    <input type="checkbox" id="varanda"> Varanda
  </label>
</div>

<!-- 🔥 NOVO: INPUT DE IMAGEM -->
<label>Imagem do imóvel</label>
<input id="imagem" type="file" accept="image/*">

<img id="preview" class="preview-img">

<input id="tour" placeholder="Link do tour 360" required>

<label>Extras do imóvel</label>

<div class="extras-box">

<label class="extra-item">
<input type="checkbox" value="Piscina" class="extra"> Piscina
</label>

<label class="extra-item">
<input type="checkbox" value="Garagem" class="extra"> Garagem
</label>

<label class="extra-item">
<input type="checkbox" value="Academia" class="extra"> Academia
</label>

<label class="extra-item">
<input type="checkbox" value="Área Gourmet" class="extra"> Área Gourmet
</label>

<label class="extra-item">
<input type="checkbox" value="Churrasqueira" class="extra"> Churrasqueira
</label>

<label class="extra-item">
<input type="checkbox" value="Elevador" class="extra"> Elevador
</label>

<label class="extra-item">
<input type="checkbox" value="Varanda" class="extra"> Varanda
</label>

<label class="extra-item">
<input type="checkbox" value="Jardim" class="extra"> Jardim
</label>

<label class="extra-item">
<input type="checkbox" value="Portaria 24h" class="extra"> Portaria 24h
</label>

<label class="extra-item">
<input type="checkbox" value="Dependência de Empregada" class="extra"> Dependência de Empregada
</label>

</div>

<button type="submit">
Salvar imóvel
</button>

</form>

<button onclick="logout()" class="logout">
Sair
</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="admin.js"></script>

<!-- 🔥 PREVIEW DA IMAGEM -->
<script>
const inputImagem = document.getElementById("imagem");
const preview = document.getElementById("preview");

inputImagem.addEventListener("change", () => {

const file = inputImagem.files[0];

if(file){
  preview.src = URL.createObjectURL(file);
  preview.style.display = "block";
}

});
</script>

</body>

</html>
