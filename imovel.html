<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalhes do Imóvel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#f8f9fb;
  color:#1e1e1e;
}

.hero{
  height:50vh;
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:end;
  padding:40px;
  color:white;
}

.hero h1{
  background:rgba(0,0,0,0.6);
  padding:15px 25px;
  border-radius:8px;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
}

.preco{
  font-size:26px;
  font-weight:600;
  margin:15px 0;
}

.whatsapp-btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:14px 24px;
  background:#25D366;
  color:white;
  text-decoration:none;
  border-radius:8px;
  font-weight:500;
  transition:.3s;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.whatsapp-btn:hover{
  transform:translateY(-2px);
}

.tour iframe{
  width:100%;
  height:80vh;
  border:none;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  margin-top:30px;
}

.btn-voltar{
  display:inline-block;
  margin-top:30px;
  text-decoration:none;
  color:#111;
}

.whatsapp-float{
  position:fixed;
  bottom:25px;
  right:25px;
  background:#25D366;
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
  transition:.3s;
}

.whatsapp-float:hover{
  transform:scale(1.1);
}

.extras{
  margin-top:30px;
}

.extras h3{
  margin-bottom:10px;
  font-size:18px;
}

.extras ul{
  list-style:none;
  padding:0;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
}

.extras li{
  background:#f1f3f6;
  padding:10px 15px;
  border-radius:8px;
  font-size:14px;
}
</style>
</head>
<body>

<div id="conteudo"></div>

<script src="corretores.js"></script>
<script src="imoveis.js"></script>

<script>
const corretorId = sessionStorage.getItem("corretorId");

if(!corretorId){
  window.location.href = "index.html";
}

const corretor = corretores.find(c => c.id === corretorId);

if(!corretor){
  window.location.href = "index.html";
}

const whatsappNumero = corretor.whatsapp;

const params = new URLSearchParams(window.location.search);
const id = parseInt(params.get("id"));

const imovel = imoveis.find(
  i => i.id === id && i.corretorId === corretorId
);

if(!imovel){
  document.getElementById("conteudo").innerHTML =
    "<h2 style='padding:40px'>Imóvel não encontrado.</h2>";
} else {

document.getElementById("conteudo").innerHTML = `
  <div class="hero" style="background-image:url('${imovel.imagem}')">
    <h1>${imovel.titulo}</h1>
  </div>

  <div class="container">
      <div class="preco">${imovel.preco}</div>

      <a class="whatsapp-btn"
        href="https://wa.me/${whatsappNumero}?text=Olá, tenho interesse no imóvel: ${encodeURIComponent(imovel.titulo)}"
        target="_blank">
        
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
          <path d="M20.52 3.48A11.94 11.94 0 0012.05 0C5.46 0 .13 5.33.13 11.92c0 2.1.55 4.14 1.6 5.93L0 24l6.33-1.66a11.9 11.9 0 005.72 1.46h.01c6.59 0 11.92-5.33 11.92-11.92 0-3.18-1.24-6.17-3.46-8.4z"/>
        </svg>

        Falar com ${corretor.nome}
      </a>

      <p style="margin-top:20px">
        ${imovel.quartos} quartos • 
        ${imovel.banheiros} banheiros • 
        ${imovel.area}
      </p>

      ${imovel.extras && imovel.extras.length > 0 ? `
        <div class="extras">
          <h3>Comodidades</h3>
          <ul>
            ${imovel.extras.map(extra => `<li>✔ ${extra}</li>`).join("")}
          </ul>
        </div>
      ` : ""}

      ${imovel.tour ? `
      <div class="tour">
        <iframe src="${imovel.tour}"
          allowfullscreen
          allow="autoplay; fullscreen; web-share; xr-spatial-tracking;">
        </iframe>
      </div>
      ` : ""}

      <a class="btn-voltar" href="painel.html">← Voltar</a>
  </div>

  <a class="whatsapp-float"
    href="https://wa.me/${whatsappNumero}"
    target="_blank">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
        <path d="M20.52 3.48A11.94 11.94 0 0012.05 0C5.46 0 .13 5.33.13 11.92c0 2.1.55 4.14 1.6 5.93L0 24l6.33-1.66a11.9 11.9 0 005.72 1.46h.01c6.59 0 11.92-5.33 11.92-11.92 0-3.18-1.24-6.17-3.46-8.4z"/>
      </svg>
  </a>
`;
}
</script>

</body>
</html>
