<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel do Corretor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  background:#f4f6f9;
  color:#1e1e1e;
}

header{
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:white;
  padding:40px 20px;
  text-align:center;
}

header h1{
  font-weight:600;
  font-size:28px;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:30px;
}

.card{
  background:white;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.06);
  transition:.3s;
  cursor:pointer;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 18px 35px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.card-content{
  padding:20px;
}

.card h3{
  font-size:18px;
  margin-bottom:10px;
}

.info{
  font-size:14px;
  color:#666;
  margin-bottom:8px;
}

.preco{
  font-size:17px;
  font-weight:600;
  color:#2a9d8f;
}

.top-bar{
  max-width:1100px;
  margin:20px auto;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
}

.btn{
  padding:10px 18px;
  border-radius:8px;
  text-decoration:none;
  font-size:14px;
  font-weight:500;
  transition:.3s;
  border:none;
  cursor:pointer;
}

.btn-logout{
  background:#e63946;
  color:white;
}

.btn-logout:hover{
  background:#c1121f;
}

.vazio{
  text-align:center;
  margin-top:60px;
  color:#777;
}
</style>
</head>
<body>

<header>
  <h1>🏠 Meus Imóveis</h1>
</header>

<div class="top-bar">
  <div></div>
  <button onclick="logout()" class="btn btn-logout">Sair</button>
</div>

<div class="container">
  <div id="listaImoveis" class="grid"></div>
</div>

<script src="imoveis.js"></script>
<script>
const corretorId = sessionStorage.getItem("corretorId");

if(!corretorId){
  window.location.href = "index.html";
}

function logout(){
  sessionStorage.removeItem("corretorId");
  window.location.href = "index.html";
}

const meusImoveis = imoveis.filter(i => i.corretorId === corretorId);
const lista = document.getElementById("listaImoveis");

if(meusImoveis.length === 0){
  lista.innerHTML = "<div class='vazio'><h3>Você ainda não possui imóveis cadastrados.</h3></div>";
} else {
  lista.innerHTML = meusImoveis.map(imovel => `
    <div class="card" onclick="verImovel(${imovel.id})">
      <img src="${imovel.imagem}">
      <div class="card-content">
        <h3>${imovel.titulo}</h3>
        <div class="info">
          ${imovel.quartos} quartos • ${imovel.banheiros} banheiros • ${imovel.area}
        </div>
        <div class="preco">${imovel.preco}</div>
      </div>
    </div>
  `).join("");
}

function verImovel(id){
  window.location.href = "imovel.html?id=" + id;
}
</script>

</body>
</html>
