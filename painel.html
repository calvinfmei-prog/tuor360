<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel de Imóveis</title>

<link rel="stylesheet" href="/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="painel-container">

<!-- HEADER -->

<header class="painel-header">

<p id="titulo" class="titulo-central"></p>

<button onclick="logout()" class="btn-sair">
Sair
</button>

</header>

<!-- FILTROS -->

<div class="filtros">

<button onclick="filtrar('todos')">
Todos
</button>

<button onclick="filtrar('venda')">
Venda
</button>

<button onclick="filtrar('aluguel')">
Aluguel
</button>

</div>

<!-- TÍTULO DA LISTA -->

<h2 class="titulo-secao">
Imóveis disponíveis
</h2>

<!-- LISTA -->

<div id="listaImoveis" class="lista"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/painel.js"></script>

</body>

</html>
